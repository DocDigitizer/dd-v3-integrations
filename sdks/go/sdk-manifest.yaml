# Go SDK Manifest
# Declares which API operations this SDK exposes.
# Only operations listed here are implemented — this is the explicit contract.

sdk:
  name: docdigitizer
  language: go
  version: "0.1.0"
  api_version: "1.0.0"
  min_go: "1.21"
  package: "github.com/DocDigitizer/dd-v3-integrations/sdks/go"
  repository: "https://github.com/DocDigitizer/dd-v3-integrations"

operations:
  - operationId: processDocument
    method: Process
    description: "Upload and process a PDF document"
  - operationId: checkHealth
    method: HealthCheck
    description: "Check API availability"
