name: Publish Rust SDK to crates.io

on:
  push:
    tags: ['rust-v*']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build
        working-directory: sdks/rust
      - run: cargo test
        working-directory: sdks/rust

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: crates
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish
        working-directory: sdks/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
