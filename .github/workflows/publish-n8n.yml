name: Publish n8n Node to npm

on:
  push:
    tags: ['n8n-v*']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: integrations/n8n
      - run: npm run build
        working-directory: integrations/n8n
      - run: npm test
        working-directory: integrations/n8n

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
        working-directory: integrations/n8n
      - run: npm run build
        working-directory: integrations/n8n
      - run: npm publish --access public
        working-directory: integrations/n8n
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
