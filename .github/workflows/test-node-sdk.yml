name: Test Node.js SDK

on:
  push:
    paths: ['sdks/node/**']
  pull_request:
    paths: ['sdks/node/**']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
        working-directory: sdks/node
      - run: npm run build
        working-directory: sdks/node
      - run: npm test
        working-directory: sdks/node
