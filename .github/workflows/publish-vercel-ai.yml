name: Publish Vercel AI SDK to npm

on:
  push:
    tags: ['vercel-ai-v*']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: integrations/vercel-ai
      - run: npm test
        working-directory: integrations/vercel-ai

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
        working-directory: integrations/vercel-ai
      - run: npm run build
        working-directory: integrations/vercel-ai
      - run: npm publish --access public
        working-directory: integrations/vercel-ai
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
