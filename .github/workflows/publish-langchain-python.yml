name: Publish LangChain Python to PyPI

on:
  push:
    tags: ['langchain-python-v*']

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
        working-directory: integrations/langchain/python
      - run: pytest tests/ -v
        working-directory: integrations/langchain/python

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build
        working-directory: integrations/langchain/python
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: integrations/langchain/python/dist/
