name: Test Rust SDK

on:
  push:
    paths: ['sdks/rust/**']
  pull_request:
    paths: ['sdks/rust/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build
        working-directory: sdks/rust
      - run: cargo test
        working-directory: sdks/rust
